<!DOCTYPE html>
<html lang="de-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminbuchung</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 50px 20px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
        }

        .buchungs-platz {
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 40px auto;
            padding: 30px;
        }

        .timify-button {
            display: inline-block;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .timify-button:hover {
            background-color: #0056b3;
        }
    </style>

    <script async
        src="https://book.timify.com/widget/widget.min.js"
        id="timify-widget"
        data-position="flexible"
        data-locale="de-ch"
    ></script>
</head>
<body>

    <h1>Ke Platz ir Bib?</h1>
    <p>Schön bisch da! Buech di Slot Bro!.</p>

    <div class="buchungs-platz">
        <h2>Online-Reservation</h2>
        <p>Klicke auf den Button, um die verfügbaren Zeiten zu sehen.</p>
        
        <div
            class="timify-button"
            data-account-id="69c04b41fd1e5755120b3949"
        >Slot buchen</div>
    </div>

</body>
</html>
